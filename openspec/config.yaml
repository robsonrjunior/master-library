schema: spec-driven

context: |
  Tech stack: Java 21, Jakarta EE 11, Payara Micro 7.2026.5, PrimeFaces 15.0.0, MySQL 9.3
  Build: Maven (mvnw), WAR packaging, Docker
  Domain: Media library — catalog and review books, movies, and series with ratings and comments

  Conventions:
    - Prefer PrimeFaces components whenever possible (use p: tags instead of raw HTML)
    - Use Bootstrap utility classes for layout adjustments only when PrimeFaces layout components are insufficient
    - Model classes use Lombok (@Getter, @Setter, @Data) instead of manual accessors
    - Keep it simple — prioritize maintainability and fast delivery over over-engineering
    - Verify changes with: ./mvnw -q -DskipTests compile
