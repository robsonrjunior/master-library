<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets">
    <style>
        .ui-panelmenu-header {
            border: 0 !important;
            border-radius: 0 !important;
        }
        .ui-panelmenu-content {
            border: 0 !important;
            border-radius: 0 !important;
        }
        .ui-scrollpanel {
            border-left: 0 !important;
            border-top: 0 !important;
            border-bottom: 0 !important;
            border-radius: 0 !important;
        }
        .ui-panelmenu .ui-menuitem-link.active-menuitem,
        .ui-panelmenu .ui-menuitem-link.active-menuitem .ui-menuitem-icon,
        .ui-panelmenu .ui-menuitem-link.active-menuitem .ui-menuitem-text {
            color: var(--primary-color) !important;
            font-weight: 600;
        }
    </style>

    <ui:param name="viewId" value="#{view.viewId}" />

    <p:scrollPanel
        mode="native"
        styleClass="surface-card h-full p-0 m-0 border-right-1 surface-border border-noround"
        style="width: 280px">
        <p:panelMenu styleClass="h-auto m-0" multiple="false" stateful="false">
            <p:submenu label="Produtos" icon="pi pi-fw pi-box"
                expanded="#{viewId.startsWith('/book') or viewId.startsWith('/movie') or viewId.startsWith('/series')}">
                <p:menuitem value="Livros" icon="pi pi-fw pi-book" outcome="book-list"
                    styleClass="#{viewId.startsWith('/book') ? 'active-menuitem' : ''}" />
                <p:menuitem value="Filmes" icon="pi pi-fw pi-video" outcome="movie-list"
                    styleClass="#{viewId.startsWith('/movie') ? 'active-menuitem' : ''}" />
                <p:menuitem value="Series" icon="pi pi-fw pi-desktop" outcome="series-list"
                    styleClass="#{viewId.startsWith('/series') ? 'active-menuitem' : ''}" />
            </p:submenu>
            <p:submenu label="Avaliacoes" icon="pi pi-fw pi-star"
                expanded="#{viewId.startsWith('/rating')}">
                <p:menuitem value="Minhas Avaliacoes" icon="pi pi-fw pi-star" outcome="rating-list"
                    styleClass="#{viewId.startsWith('/rating') ? 'active-menuitem' : ''}" />
            </p:submenu>
            <p:submenu label="Administracao" icon="pi pi-fw pi-cog" rendered="#{currentUser.admin}"
                expanded="#{viewId.startsWith('/user')}">
                <p:menuitem value="Usuarios" icon="pi pi-fw pi-users" outcome="user-list"
                    styleClass="#{viewId.startsWith('/user') ? 'active-menuitem' : ''}" />
                <p:menuitem value="Avaliacoes" icon="pi pi-fw pi-star" outcome="rating-list" />
            </p:submenu>
        </p:panelMenu>
    </p:scrollPanel>
</ui:composition>
