<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets">
    <div class="flex-grow-1 d-flex align-items-center justify-content-center w-100 bg-light">
        <h:form>
            <p:card style="width: 400px">
                <f:facet name="title">
                    <div class="text-center">
                        <p:graphicImage name="images/master-library.png" library="showcase" width="48" />
                        <h4 class="mt-2">Master Library</h4>
                    </div>
                </f:facet>

                <div class="d-flex flex-column gap-3">
                    <p:messages id="globalMsgs" showDetail="true" display="text" />

                    <div>
                        <p:outputLabel for="username" value="Username" />
                        <p:inputText
                            id="username"
                            value="#{loginController.username}"
                            required="true"
                            placeholder="Username"
                            styleClass="w-100" />
                    </div>

                    <div>
                        <p:outputLabel for="password" value="Senha" />
                        <p:password
                            id="password"
                            value="#{loginController.password}"
                            required="true"
                            placeholder="Senha"
                            feedback="false"
                            styleClass="w-100" />
                    </div>

                    <p:commandButton
                        value="Entrar"
                        icon="pi pi-sign-in"
                        action="#{loginController.login}"
                        styleClass="w-100"
                        ajax="false" />
                </div>
            </p:card>
        </h:form>
    </div>
</ui:composition>
